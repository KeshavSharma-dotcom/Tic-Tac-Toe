<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="msg-container hide">
        <div class="msg-content">
            <p id="msg">Winner</p>
            <button id="new-btn">New Game</button>
        </div>
    </div>
    <main>
        <div class="header">
            <h1>TIC<span>TAC</span>TOE</h1>
        </div>
        <div class="container">
            <div class="game">
                <button class="Box" aria-label="Game cell 1"></button>
                <button class="Box" aria-label="Game cell 2"></button>
                <button class="Box" aria-label="Game cell 3"></button>
                <button class="Box" aria-label="Game cell 4"></button>
                <button class="Box" aria-label="Game cell 5"></button>
                <button class="Box" aria-label="Game cell 6"></button>
                <button class="Box" aria-label="Game cell 7"></button>
                <button class="Box" aria-label="Game cell 8"></button>
                <button class="Box" aria-label="Game cell 9"></button>
            </div>
        </div>
        <div class="controls">
            <button id="reset-btn">Reset Game</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
